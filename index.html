<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3b82f6">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Harcama Takip">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Harcama Takip</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f0f4f8;
    --white: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --green: #22c55e;
    --green-dark: #16a34a;
    --purple: #8b5cf6;
    --radius: 14px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --th-bg: #f1f5f9;
    --input-bg: #f8fafc;
    --card-icon-bg: #f1f5f9;
    --row-hover: #f8fafc;
  }
  html.dark {
    --bg: #0f172a;
    --white: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --shadow: 0 2px 12px rgba(0,0,0,0.3);
    --th-bg: #1a2744;
    --input-bg: #263352;
    --card-icon-bg: #263352;
    --row-hover: #263352;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 28px 24px;
  }

  h1.page-title {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 24px;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  /* ── Summary Cards ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    transition: transform .2s, box-shadow .2s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }

  .card-label {
    font-size: .85rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 1.65rem;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -1px;
  }
  .card-icon {
    font-size: 1.6rem;
    background: var(--card-icon-bg);
    border-radius: 10px;
    width: 46px; height: 46px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Filter Panel ── */
  .panel {
    background: var(--white);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  .panel-title {
    font-size: 1rem;
    font-weight: 800;
    margin-bottom: 16px;
    color: var(--text);
  }

  .filter-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .search-box {
    display: flex;
    align-items: center;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    overflow: hidden;
    background: var(--input-bg);
    flex: 1; max-width: 320px;
  }
  .search-box input {
    border: none; outline: none; background: transparent;
    padding: 9px 12px; font-family: inherit; font-size: .9rem; width: 100%;
    color: var(--text); background: transparent;
  }
  .search-box button {
    border: none; background: none; padding: 0 12px;
    cursor: pointer; color: var(--muted); font-size: 1rem;
  }

  .btn-group { display: flex; gap: 8px; }

  .btn {
    padding: 9px 18px; border: none; border-radius: 9px;
    font-family: inherit; font-size: .85rem; font-weight: 700;
    cursor: pointer; transition: filter .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-purple { background: var(--purple); color: #fff; }
  .btn-green  { background: var(--green);  color: #fff; }
  .btn-blue   { background: var(--blue);   color: #fff; }
  .btn-gray   { background: var(--border); color: var(--text); }
  .btn:hover  { filter: brightness(1.08); }

  /* filter-row replaced by filter-grid */

  /* ── Bottom Grid ── */
  .bottom-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 20px;
  }

  /* ── Chart Panel ── */
  .chart-wrap {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    padding: 10px 0;
  }
  .chart-canvas-wrap {
    flex-shrink: 0;
    width: 240px; height: 240px;
    position: relative;
  }
  .legend {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 5px 14px;
    flex: 1;
    max-height: 280px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .legend::-webkit-scrollbar { width: 4px; }
  .legend::-webkit-scrollbar-track { background: var(--th-bg); border-radius: 4px; }
  .legend::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px;
    font-size: .78rem; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
  }

  /* ── Add Form ── */
  .form-panel { }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block; font-size: .85rem; font-weight: 700;
    margin-bottom: 5px; color: var(--text);
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%; border: 1.5px solid var(--border); border-radius: 9px;
    padding: 9px 12px; font-family: inherit; font-size: .9rem;
    background: var(--input-bg); color: var(--text); outline: none;
    transition: border-color .2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--blue); background: var(--white); }
  .form-group textarea { resize: vertical; min-height: 62px; }

  .btn-full { width: 100%; padding: 11px; font-size: 1rem; border-radius: 10px; }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; margin-top: 20px; }
  table {
    width: 100%; border-collapse: collapse; font-size: .85rem;
    table-layout: fixed;
  }
  /* Fixed column widths */
  table colgroup col:nth-child(1) { width: 44px; }   /* # */
  table colgroup col:nth-child(2) { width: 108px; }  /* Tarih */
  table colgroup col:nth-child(3) { width: 200px; }  /* Kategori */
  table colgroup col:nth-child(4) { width: auto; }   /* Açıklama — flexible */
  table colgroup col:nth-child(5) { width: 130px; }  /* Ödeme Yöntemi */
  table colgroup col:nth-child(6) { width: 110px; }  /* Tutar */
  table colgroup col:nth-child(7) { width: 60px; }   /* İşlem */

  th {
    background: var(--th-bg); font-weight: 700; text-align: left;
    padding: 10px 12px; color: var(--muted);
    border-bottom: 2px solid var(--border);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  th.sortable:hover { color: var(--blue); }
  .sort-arrow { font-size: .75rem; opacity: .4; }
  .sort-arrow.asc  { opacity:1; color: var(--blue); }
  .sort-arrow.desc { opacity:1; color: var(--blue); }

  /* Pagination */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 14px 0 2px;
    flex-wrap: wrap;
  }
  .pg-btn {
    min-width: 34px; height: 34px; padding: 0 10px;
    border: 1.5px solid var(--border); background: var(--white);
    border-radius: 8px; font-family: inherit; font-size: .82rem;
    font-weight: 700; color: var(--text); cursor: pointer;
    transition: all .15s;
  }
  .pg-btn:hover { border-color: var(--blue); color: var(--blue); }
  .pg-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .pg-btn:disabled { opacity: .35; cursor: default; }
  .pg-info { font-size: .82rem; color: var(--muted); font-weight: 600; }
  td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  /* Açıklama sütunu wrap edebilir */
  td.td-aciklama { white-space: normal; word-break: break-word; }
  tr:hover td { background: var(--row-hover); }
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 20px;
    font-size: .75rem; font-weight: 700;
  }
  .badge-nakit  { background: #dcfce7; color: #166534; }
  .badge-kart   { background: #dbeafe; color: #1e40af; }
  .badge-havale { background: #fef9c3; color: #854d0e; }

  .delete-btn {
    background: #fee2e2; color: #dc2626; border: none;
    border-radius: 6px; padding: 4px 10px; cursor: pointer;
    font-size: .8rem; font-weight: 700; transition: background .15s;
  }
  .delete-btn:hover { background: #fca5a5; }

  /* notifications */
  .notif {
    position: fixed; bottom: 24px; right: 24px;
    background: #1e293b; color: #fff; padding: 12px 20px;
    border-radius: 10px; font-size: .88rem; font-weight: 600;
    box-shadow: 0 4px 16px rgba(0,0,0,.2);
    opacity: 0; transform: translateY(12px);
    transition: opacity .3s, transform .3s;
    z-index: 9999;
  }
  .notif.show { opacity: 1; transform: translateY(0); }

  /* filter-grid: desktop yatay, mobil dikey */
  .filter-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 12px;
  }
  .filter-field { display: flex; flex-direction: column; gap: 4px; }
  .filter-field label { font-size: .82rem; font-weight: 700; color: var(--muted); }
  .filter-field input,
  .filter-field select {
    width: 100%;
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 8px 10px; font-family: inherit; font-size: .85rem;
    background: var(--input-bg); color: var(--text); outline: none;
  }
  .filter-field input:focus,
  .filter-field select:focus { border-color: var(--blue); }
  .range-wrap { display: flex; align-items: center; gap: 6px; }
  .range-wrap input { width: 100%; }

  @media (max-width: 900px) {
    .cards { grid-template-columns: 1fr 1fr; }
    .bottom-grid { grid-template-columns: 1fr; }
    .filter-grid { grid-template-columns: 1fr 1fr; }
  }

  @media (max-width: 600px) {
    /* Sıfırla: taşmayı önle */
    html, body { overflow-x: hidden; width: 100%; }
    body { padding: 10px 10px; box-sizing: border-box; }

    /* Header */
    .page-title { font-size: 1rem; }
    #themeBtn { padding: 6px 10px; font-size: .75rem; }

    /* Kartlar: 2 sütun */
    .cards { grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
    .cards .card:last-child { grid-column: 1 / -1; }
    .card { padding: 12px 12px; border-radius: 12px; }
    .card-value { font-size: 1.05rem; }
    .card-label { font-size: .7rem; }
    .card-icon { width: 32px; height: 32px; font-size: .9rem; }

    /* Panel */
    .panel { padding: 12px 10px; border-radius: 12px; margin-bottom: 10px; }
    .panel-title { font-size: .9rem; margin-bottom: 10px; }

    /* Arama + butonlar */
    .filter-top { flex-direction: column; gap: 8px; }
    .search-box { max-width: 100%; width: 100%; }
    .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .btn-group .btn { font-size: .78rem; padding: 10px 4px; text-align: center; }

    /* Filtre alanları: tek sütun */
    .filter-grid { grid-template-columns: 1fr; gap: 8px; margin-top: 10px; }
    .filter-field input,
    .filter-field select { font-size: .9rem; padding: 10px 10px; }

    /* Bottom grid */
    .bottom-grid { grid-template-columns: 1fr; gap: 10px; }

    /* Chart */
    .chart-wrap { flex-direction: column; align-items: center; gap: 12px; }
    .chart-canvas-wrap { width: 180px; height: 180px; }
    .legend { grid-template-columns: repeat(2,1fr); max-height: 150px; width: 100%; }
    .legend-item { font-size: .74rem; }

    /* Form */
    .form-group { margin-bottom: 10px; }
    .form-group label { font-size: .82rem; }
    .form-group input,
    .form-group select,
    .form-group textarea { font-size: 1rem; padding: 11px 12px; border-radius: 10px; }
    .btn-full { padding: 14px; font-size: 1rem; border-radius: 12px; }

    /* Masa üstü tabloyu gizle, kart görünümünü göster */
    .table-wrap table { display: none !important; }
    #pagination { display: none !important; }
    .record-cards { display: block; }

    /* Pagination */
    .pg-btn { min-width: 28px; height: 28px; font-size: .72rem; padding: 0 5px; }

    /* Notif */
    .notif { left: 8px; right: 8px; bottom: 10px; text-align: center; font-size: .82rem; }
  }
</style>
</head>
<body>

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
  <h1 class="page-title" style="margin-bottom:0">💰 Harcama Takip Paneli</h1>
  <button id="themeBtn" onclick="toggleTheme()" style="
    background:var(--white);border:1.5px solid var(--border);border-radius:10px;
    padding:8px 16px;font-family:inherit;font-size:.9rem;font-weight:700;
    color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px;
    box-shadow:var(--shadow);transition:all .2s;">
    🌙 Karanlık Mod
  </button>
</div>

<!-- Summary Cards -->
<div class="cards">
  <div class="card">
    <div>
      <div class="card-label" id="labelToplam">Toplam Gider</div>
      <div class="card-value" id="totalGider">₺0,00</div>
    </div>
    <div class="card-icon">💸</div>
  </div>
  <div class="card">
    <div>
      <div class="card-label" id="labelFiltreli">Filtrelenmiş Gider</div>
      <div class="card-value" id="filteredGider">₺0,00</div>
    </div>
    <div class="card-icon">🔍</div>
  </div>
  <div class="card">
    <div>
      <div class="card-label" id="labelKayit">Kayıt Sayısı</div>
      <div class="card-value" id="kayitSayisi">0</div>
    </div>
    <div class="card-icon">📊</div>
  </div>
</div>

<!-- Filter Panel -->
<div class="panel">
  <div class="panel-title">Arama ve Filtreleme</div>
  <div class="filter-top">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Ara..." oninput="debounceSearch()">
      <button>🔍</button>
    </div>
    <div class="btn-group">
      <button class="btn btn-purple" onclick="exportExcel()">📤 Excel'e Aktar</button>
      <button class="btn btn-green"  onclick="importExcel()">📥 Excel'den Yükle</button>
      <button class="btn" onclick="clearAllData()" style="background:#ef4444;color:#fff;">🗑️ Tümünü Sil</button>
    </div>
  </div>
  <div class="filter-grid">
    <div class="filter-field">
      <label>Tarih</label>
      <input type="date" id="filterDate" onchange="applyFilter()">
    </div>
    <div class="filter-field">
      <label>Kategori</label>
      <select id="filterKategori" onchange="applyFilter()">
        <option value="">Tümü</option>
      </select>
    </div>
    <div class="filter-field">
      <label>Ödeme Yöntemi</label>
      <select id="filterOdeme" onchange="applyFilter()">
        <option value="">Tümü</option>
        <option>Nakit</option>
        <option>Kredi Kartı</option>
        <option>Havale/EFT</option>
      </select>
    </div>
    <div class="filter-field">
      <label>Tutar Aralığı</label>
      <div class="range-wrap">
        <input type="number" id="minTutar" placeholder="Min" oninput="debounceSearch()">
        <span>–</span>
        <input type="number" id="maxTutar" placeholder="Max" oninput="debounceSearch()">
      </div>
    </div>
  </div>
  <button class="btn btn-gray" style="margin-top:10px;" onclick="clearFilter()">✕ Temizle</button>
</div>

<!-- Bottom Grid -->
<div class="bottom-grid">
  <!-- Chart -->
  <div class="panel">
    <div class="panel-title">Gider Dağılımı</div>
    <div class="chart-wrap">
      <div class="chart-canvas-wrap">
        <canvas id="donutChart"></canvas>
      </div>
      <div class="legend" id="chartLegend"></div>
    </div>
  </div>

  <!-- Add Form -->
  <div class="panel form-panel">
    <div class="panel-title">Veri Ekle</div>
    <div class="form-group">
      <label>Tarih</label>
      <input type="date" id="fTarih">
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <select id="fKategori">
        <option value="">Seçiniz</option>
        <option>Doğalgaz ana kolon ödemesi</option>
        <option>Çöp Toplama</option>
        <option>Gürel Yönetim Ücreti</option>
        <option>Bina Temizliği</option>
        <option>Çöp ve Temizlik ödemesi</option>
        <option>Blok ortak elektrik</option>
        <option>Site ortak alan taş onarım bedeli</option>
        <option>Sokak canlarına kuru mama</option>
        <option>Binanın boya ücreti</option>
        <option>Bina temizlik hizmeti</option>
        <option>Diğer</option>
      </select>
    </div>
    <div class="form-group">
      <label>Açıklama</label>
      <textarea id="fAciklama" placeholder="Açıklama giriniz..."></textarea>
    </div>
    <div class="form-group">
      <label>Ödeme Yöntemi</label>
      <select id="fOdeme">
        <option value="">Seçiniz</option>
        <option>Nakit</option>
        <option>Kredi Kartı</option>
        <option>Havale/EFT</option>
      </select>
    </div>
    <div class="form-group">
      <label>Tutar (₺)</label>
      <input type="number" id="fTutar" placeholder="0,00" step="0.01" min="0">
    </div>
    <button class="btn btn-blue btn-full" onclick="addRecord()">➕ Ekle</button>
  </div>
</div>

<!-- Table -->
<div class="panel" style="margin-top:20px">
  <div class="panel-title">Harcama Kayıtları</div>
  <div class="table-wrap">
    <table id="mainTable">
      <colgroup>
        <col><col><col><col><col><col><col>
      </colgroup>
      <thead>
        <tr>
          <th>#</th>
          <th class="sortable" onclick="setSort('tarih')" style="cursor:pointer;user-select:none;">Tarih <span id="sort-tarih" class="sort-arrow"></span></th>
          <th class="sortable" onclick="setSort('kategori')" style="cursor:pointer;user-select:none;">Kategori <span id="sort-kategori" class="sort-arrow"></span></th>
          <th class="sortable" onclick="setSort('aciklama')" style="cursor:pointer;user-select:none;">Açıklama <span id="sort-aciklama" class="sort-arrow"></span></th>
          <th class="sortable" onclick="setSort('odeme')" style="cursor:pointer;user-select:none;">Ödeme Yöntemi <span id="sort-odeme" class="sort-arrow"></span></th>
          <th class="sortable" onclick="setSort('tutar')" style="cursor:pointer;user-select:none;">Tutar <span id="sort-tutar" class="sort-arrow"></span></th>
          <th>İşlem</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="pagination" class="pagination"></div>
  </div>
  <!-- Mobil kart görünümü -->
  <div id="recordCards" class="record-cards"></div>
  <div id="mobilePagination" class="rec-mobile-pagination"></div>
</div>

<!-- Notification -->
<div class="notif" id="notif"></div>

<script>
// ── Data ──────────────────────────────────────────────
let records = JSON.parse(localStorage.getItem('harcamalar') || '[]');
let chart = null;
let filteredRecords = [...records];

const COLORS = [
  '#f97316','#ec4899','#3b82f6','#eab308','#22c55e',
  '#f59e0b','#84cc16','#06b6d4','#8b5cf6','#ef4444',
  '#14b8a6','#a855f7','#64748b','#fb923c','#4ade80'
];

// ── Init ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('fTarih').value = today;
  render();
});

function save() { localStorage.setItem('harcamalar', JSON.stringify(records)); }

// ── Add Record ────────────────────────────────────────
function addRecord() {
  const tarih    = document.getElementById('fTarih').value;
  const kategori = document.getElementById('fKategori').value;
  const aciklama = document.getElementById('fAciklama').value.trim();
  const odeme    = document.getElementById('fOdeme').value;
  const tutar    = parseFloat(document.getElementById('fTutar').value);

  if (!tarih || !kategori || !odeme || isNaN(tutar) || tutar <= 0) {
    showNotif('⚠️ Lütfen tüm alanları doldurunuz.');
    return;
  }

  records.push({ id: Date.now(), tarih, kategori, aciklama, odeme, tutar });
  save();

  document.getElementById('fKategori').value = '';
  document.getElementById('fAciklama').value = '';
  document.getElementById('fOdeme').value    = '';
  document.getElementById('fTutar').value    = '';

  filteredRecords = [...records];
  render();
  showNotif('✅ Kayıt başarıyla eklendi!');
}

// ── Delete ────────────────────────────────────────────
function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  save();
  filteredRecords = filteredRecords.filter(r => r.id !== id);
  render();
  showNotif('🗑️ Kayıt silindi.');
}

// ── Filter ────────────────────────────────────────────
function applyFilter() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const date   = document.getElementById('filterDate').value;
  const kat    = document.getElementById('filterKategori').value;
  const odeme  = document.getElementById('filterOdeme').value;
  const min    = parseFloat(document.getElementById('minTutar').value) || 0;
  const max    = parseFloat(document.getElementById('maxTutar').value) || Infinity;

  filteredRecords = records.filter(r => {
    return (
      (!search || r.kategori.toLowerCase().includes(search) || r.aciklama.toLowerCase().includes(search)) &&
      (!date   || r.tarih === date) &&
      (!kat    || r.kategori === kat) &&
      (!odeme  || r.odeme === odeme) &&
      (r.tutar >= min && r.tutar <= max)
    );
  });
  render();
}

function clearFilter() {
  ['searchInput','filterDate','filterKategori','filterOdeme','minTutar','maxTutar']
    .forEach(id => document.getElementById(id).value = '');
  filteredRecords = [...records];
  render();
}

// ── Sort & Pagination state ───────────────────────────
const PAGE_SIZE  = 100;
let currentPage  = 1;
let sortKey      = 'tarih';
let sortDir      = 'desc';   // 'asc' | 'desc'
let sortedCache  = [];
let chartTimer   = null;
let saveTimer    = null;

// ── Dark mode ─────────────────────────────────────────
function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = isDark ? '☀️ Aydınlık Mod' : '🌙 Karanlık Mod';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
(function applyTheme() {
  if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
    window.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('themeBtn');
      if (btn) btn.textContent = '☀️ Aydınlık Mod';
    });
  }
})();

// ── Sort ──────────────────────────────────────────────
function setSort(key) {
  if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  else { sortKey = key; sortDir = 'asc'; }
  updateSortArrows();
  buildSortedCache();
  renderTablePage();
}

function updateSortArrows() {
  ['tarih','kategori','aciklama','odeme','tutar'].forEach(k => {
    const el = document.getElementById('sort-' + k);
    if (!el) return;
    if (k === sortKey) {
      el.textContent = sortDir === 'asc' ? ' ↑' : ' ↓';
      el.className = 'sort-arrow ' + sortDir;
    } else {
      el.textContent = ' ↕';
      el.className = 'sort-arrow';
    }
  });
}

function buildSortedCache() {
  sortedCache = [...filteredRecords].sort((a, b) => {
    let av = a[sortKey] ?? '', bv = b[sortKey] ?? '';
    if (sortKey === 'tutar') {
      av = Number(av); bv = Number(bv);
      return sortDir === 'asc' ? av - bv : bv - av;
    }
    av = String(av).toLowerCase(); bv = String(bv).toLowerCase();
    return sortDir === 'asc' ? av.localeCompare(bv, 'tr') : bv.localeCompare(av, 'tr');
  });
}

// ── Render ────────────────────────────────────────────
function render() {
  updateCards();
  buildSortedCache();
  currentPage = 1;
  renderTablePage();
  scheduleChartUpdate();
  updateKategoriOptions();
  updateSortArrows();
}

function updateCards() {
  const allTotal      = records.reduce((s,r) => s + r.tutar, 0);
  const filtTotal     = filteredRecords.reduce((s,r) => s + r.tutar, 0);
  const isFiltered    = filteredRecords.length !== records.length;

  // Card 1: always shows grand total
  document.getElementById('totalGider').textContent    = fmt(allTotal);
  document.getElementById('labelToplam').textContent   = 'Toplam Gider';

  // Card 2: shows filtered total; if no filter active, same as total
  document.getElementById('filteredGider').textContent = fmt(filtTotal);
  document.getElementById('labelFiltreli').textContent = isFiltered ? 'Filtrelenmiş Gider ✔' : 'Filtrelenmiş Gider';
  document.getElementById('filteredGider').closest('.card').style.outline =
    isFiltered ? '2px solid var(--blue)' : 'none';

  // Card 3: filtered count / total count
  document.getElementById('kayitSayisi').textContent =
    isFiltered ? filteredRecords.length + ' / ' + records.length : records.length;
  document.getElementById('labelKayit').textContent =
    isFiltered ? 'Filtrelenmiş / Toplam Kayıt' : 'Kayıt Sayısı';
}

// Debounced save
function save() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try { localStorage.setItem('harcamalar', JSON.stringify(records)); } catch(e) {}
  }, 400);
}

function renderTablePage() {
  const tbody  = document.getElementById('tableBody');
  const total  = sortedCache.length;
  const pages  = Math.max(1, Math.ceil(total / PAGE_SIZE));
  currentPage  = Math.min(currentPage, pages);
  const start  = (currentPage - 1) * PAGE_SIZE;
  const end    = Math.min(start + PAGE_SIZE, total);
  const page   = sortedCache.slice(start, end);

  if (total === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#94a3b8;padding:24px">Kayıt bulunamadı.</td></tr>';
    renderPagination(0, 0);
    return;
  }

  // Build full HTML string at once — single DOM write (O(n) not O(n²))
  const parts = new Array(page.length);
  for (let i = 0; i < page.length; i++) {
    const r = page[i];
    const globalIdx = start + i + 1;
    const badge = r.odeme === 'Nakit' ? 'badge-nakit'
                : r.odeme === 'Kredi Kartı' ? 'badge-kart' : 'badge-havale';
    parts[i] =
      '<tr>' +
      '<td>' + globalIdx + '</td>' +
      '<td>' + (r.tarih ? r.tarih.split('-').reverse().join('.') : '') + '</td>' +
      '<td>' + esc(r.kategori) + '</td>' +
      '<td class="td-aciklama">' + esc(r.aciklama || '—') + '</td>' +
      '<td><span class="badge ' + badge + '">' + esc(r.odeme) + '</span></td>' +
      '<td><strong>' + fmt(r.tutar) + '</strong></td>' +
      '<td><button class="delete-btn" onclick="deleteRecord(' + r.id + ')">Sil</button></td>' +
      '</tr>';
  }
  tbody.innerHTML = parts.join('');
  renderPagination(pages, total);
  renderMobileCards(page, start, pages, total);
}

function renderMobileCards(page, start, pages, total) {
  const container = document.getElementById('recordCards');
  const mobPg = document.getElementById('mobilePagination');
  if (!container) return;
  if (total === 0) {
    container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:24px;font-size:.9rem">Kayıt bulunamadı.</div>';
    mobPg.innerHTML = '';
    return;
  }
  const parts = new Array(page.length);
  for (let i = 0; i < page.length; i++) {
    const r = page[i];
    const badge = r.odeme === 'Nakit' ? 'badge-nakit'
                : r.odeme === 'Kredi Kartı' ? 'badge-kart' : 'badge-havale';
    parts[i] =
      '<div class="rec-card">' +
        '<div class="rec-card-header">' +
          '<div class="rec-card-kat">' + esc(r.kategori) + '</div>' +
          '<div class="rec-card-tutar">' + fmt(r.tutar) + '</div>' +
        '</div>' +
        '<div class="rec-card-meta">' +
          '<span class="rec-card-tarih">📅 ' + (r.tarih ? r.tarih.split('-').reverse().join('.') : '') + '</span>' +
          '<span class="badge ' + badge + '" style="font-size:.7rem">' + esc(r.odeme) + '</span>' +
          (r.aciklama ? '<span class="rec-card-aciklama">· ' + esc(r.aciklama) + '</span>' : '') +
          '<button class="rec-card-del" onclick="deleteRecord(' + r.id + ')">🗑</button>' +
        '</div>' +
      '</div>';
  }
  container.innerHTML = parts.join('');

  // Mobile pagination
  if (pages <= 1) { mobPg.innerHTML = ''; return; }
  let ph = '<button class="pg-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>‹</button>';
  const maxB = 5, s2 = Math.max(1, currentPage-2), e2 = Math.min(pages, s2+maxB-1);
  for (let p = s2; p <= e2; p++)
    ph += '<button class="pg-btn' + (p===currentPage?' active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  ph += '<button class="pg-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===pages?'disabled':'') + '>›</button>';
  ph += '<span class="pg-info">' + total.toLocaleString('tr-TR') + ' kayıt</span>';
  mobPg.innerHTML = ph;
}

function renderPagination(pages, total) {
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  const MAX_BTNS = 7;
  let html = '';
  html += '<button class="pg-btn" onclick="goPage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>‹</button>';

  let start = Math.max(1, currentPage - Math.floor(MAX_BTNS/2));
  let end   = Math.min(pages, start + MAX_BTNS - 1);
  if (end - start < MAX_BTNS - 1) start = Math.max(1, end - MAX_BTNS + 1);

  if (start > 1) html += '<button class="pg-btn" onclick="goPage(1)">1</button>' + (start>2 ? '<span class="pg-info">…</span>' : '');
  for (let p = start; p <= end; p++)
    html += '<button class="pg-btn' + (p===currentPage?' active':'') + '" onclick="goPage(' + p + ')">' + p + '</button>';
  if (end < pages) html += (end<pages-1 ? '<span class="pg-info">…</span>' : '') + '<button class="pg-btn" onclick="goPage(' + pages + ')">' + pages + '</button>';

  html += '<button class="pg-btn" onclick="goPage(' + (currentPage+1) + ')" ' + (currentPage===pages?'disabled':'') + '>›</button>';
  html += '<span class="pg-info">&nbsp;' + total.toLocaleString('tr-TR') + ' kayıt</span>';
  pg.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTablePage();
  document.getElementById('mainTable').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Chart (debounced) ─────────────────────────────────
function scheduleChartUpdate() {
  clearTimeout(chartTimer);
  chartTimer = setTimeout(renderChart, 200);
}

function renderChart() {
  const grouped = {};
  filteredRecords.forEach(r => {
    grouped[r.kategori] = (grouped[r.kategori] || 0) + r.tutar;
  });
  const labels = Object.keys(grouped);
  const data   = Object.values(grouped);
  const colors = labels.map((_, i) => COLORS[i % COLORS.length]);

  const legend = document.getElementById('chartLegend');
  legend.innerHTML = labels.length === 0
    ? '<span style="color:#94a3b8;font-size:.82rem">Veri yok</span>'
    : labels.map((l,i) =>
        '<div class="legend-item"><div class="legend-dot" style="background:' + colors[i] + '"></div><span>' + esc(l) + '</span></div>'
      ).join('');

  const ctx = document.getElementById('donutChart').getContext('2d');
  if (chart) {
    chart.data.labels = labels;
    chart.data.datasets[0].data = data;
    chart.data.datasets[0].backgroundColor = colors;
    chart.update('none');
    return;
  }
  chart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }] },
    options: {
      cutout: '58%',
      animation: { duration: 400 },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ' ' + c.label + ': ' + fmt(c.raw) } }
      }
    }
  });
}

// ── Kategori filter options ───────────────────────────
function updateKategoriOptions() {
  const sel = document.getElementById('filterKategori');
  const current = sel.value;
  const cats = [...new Set(records.map(r => r.kategori))].sort((a,b) => a.localeCompare(b,'tr'));
  sel.innerHTML = '<option value="">Tümü</option>' +
    cats.map(c => '<option' + (c===current?' selected':'') + '>' + esc(c) + '</option>').join('');
}

// XSS-safe escape
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Utils ─────────────────────────────────────────────
function fmt(n) {
  return '₺' + n.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

let searchTimer = null;
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilter, 250);
}

function clearAllData() {
  if (!confirm('Tüm kayıtlar silinecek. Emin misiniz?')) return;
  records = [];
  filteredRecords = [];
  save();
  render();
  showNotif('🗑️ Tüm kayıtlar silindi.');
}

function exportExcel() {
  const rows = [['Tarih','Kategori','Açıklama','Ödeme Yöntemi','Tutar']];
  filteredRecords.forEach(r => rows.push([r.tarih, r.kategori, r.aciklama, r.odeme, r.tutar]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'harcamalar.csv';
  a.click();
  showNotif('📤 Dışa aktarıldı!');
}

function importExcel() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls,.csv';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const isCSV = file.name.toLowerCase().endsWith('.csv');
    const reader = new FileReader();

    reader.onload = ev => {
      let rows = [];

      if (isCSV) {
        // ── CSV path ──────────────────────────────────
        const text = ev.target.result;
        const lines = text.split(/\r?\n/);
        const sep = lines[0].includes(';') ? ';' : ',';
        rows = lines.map(line => {
          const cols = []; let cur = '', inQ = false;
          for (let c of line) {
            if (c === '"') { inQ = !inQ; }
            else if (c === sep && !inQ) { cols.push(cur.trim()); cur = ''; }
            else cur += c;
          }
          cols.push(cur.trim());
          return cols.map(c => c.replace(/^"|"$/g,'').trim());
        });
      } else {
        // ── XLSX path ─────────────────────────────────
        const data = new Uint8Array(ev.target.result);
        const wb   = XLSX.read(data, { type: 'array', cellDates: true });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
        rows = json.map(row => row.map(cell => {
          if (cell instanceof Date) {
            // Format as yyyy-MM-dd
            const y = cell.getFullYear();
            const m = String(cell.getMonth()+1).padStart(2,'0');
            const d = String(cell.getDate()).padStart(2,'0');
            return `${y}-${m}-${d}`;
          }
          return String(cell ?? '').trim();
        }));
      }

      if (rows.length < 2) { showNotif('⚠️ Dosyada veri bulunamadı.'); return; }

      // Map header row to column indices
      const headers = rows[0].map(h => h.toLowerCase()
        .replace(/ı/g,'i').replace(/ş/g,'s').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ö/g,'o').replace(/ç/g,'c') // Turkish chars
        .trim());
      const fi = key => {
        const maps = {
          tarih:    ['tarih'],
          kategori: ['kategori'],
          aciklama: ['aciklama','açıklama','aciklama'],
          odeme:    ['odeme yontemi','ödeme yöntemi','odeme','ödeme'],
          tutar:    ['tutar'],
        };
        return headers.findIndex(h => (maps[key]||[]).includes(h));
      };
      const idx = { tarih: fi('tarih'), kategori: fi('kategori'), aciklama: fi('aciklama'), odeme: fi('odeme'), tutar: fi('tutar') };

      let count = 0;
      rows.slice(1).forEach(cols => {
        const get = i => (i >= 0 && i < cols.length) ? String(cols[i]).trim() : '';

        let tarih = get(idx.tarih);
        // dd.MM.yyyy → yyyy-MM-dd
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(tarih)) {
          const [d,m,y] = tarih.split('.'); tarih = `${y}-${m}-${d}`;
        }
        // Excel serial number fallback
        if (/^\d{5}$/.test(tarih)) {
          const d = XLSX.SSF.parse_date_code(parseInt(tarih));
          tarih = `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
        }

        const kategori = get(idx.kategori);
        const aciklama = get(idx.aciklama);
        const odeme    = get(idx.odeme);

        // Parse number: handles 4000, 4000.5, "4.000,00", "4,000.00"
        let t = get(idx.tutar).replace(/[₺\s]/g,'');
        if (/^[\d.,]+$/.test(t)) {
          if (t.includes(',') && t.includes('.')) {
            // Determine which is decimal separator by position of last one
            const lastComma = t.lastIndexOf(',');
            const lastDot   = t.lastIndexOf('.');
            t = lastComma > lastDot
              ? t.replace(/\./g,'').replace(',','.')   // Turkish: 4.000,50
              : t.replace(/,/g,'');                    // English: 4,000.50
          } else if (t.includes(',')) {
            t = t.replace(',','.');  // plain decimal comma
          }
        }
        const tutar = parseFloat(t) || 0;

        if (tarih && kategori && tutar > 0) {
          records.push({ id: Date.now() + Math.random(), tarih, kategori, aciklama, odeme, tutar });
          count++;
        }
      });

      save();
      filteredRecords = [...records];
      render();
      showNotif(count > 0 ? `📥 ${count} kayıt yüklendi!` : '⚠️ Hiç kayıt yüklenemedi. Sütun başlıklarını kontrol edin.');
    };

    if (isCSV) reader.readAsText(file, 'utf-8');
    else        reader.readAsArrayBuffer(file);
  };
  input.click();
}
